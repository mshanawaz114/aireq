# Dependabot — keep dependencies (and security advisories) current without
# generating PR floods.
#
# Strategy:
#   - Weekly cadence (Monday 06:00 UTC) for routine bumps.
#   - Daily cadence for GitHub Actions (smaller, safer ecosystem).
#   - Grouped PRs per ecosystem so one bump-up Monday produces one PR
#     (or two: security + non-security), not 30.
#   - Major-version bumps are flagged but require a human merge.
#
# Refs: AIR0004

version: 2

updates:
  # ───────── .NET / NuGet ─────────
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - dotnet
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      dotnet-minor-and-patch:
        applies-to: version-updates
        update-types: [minor, patch]
      dotnet-security:
        applies-to: security-updates

  # ───────── apps/web (pnpm) ─────────
  - package-ecosystem: npm
    directory: "/apps/web"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - web
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      web-minor-and-patch:
        applies-to: version-updates
        update-types: [minor, patch]
      web-security:
        applies-to: security-updates

  # ───────── GitHub Actions ─────────
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: daily
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "chore(ci)"
      include: scope
    groups:
      gha-all:
        applies-to: version-updates
        patterns: ["*"]
